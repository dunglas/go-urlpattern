name: CI

on:
  push:
  pull_request:

env:
  # Pin to the toolchain set up by actions/setup-go so Go does not silently
  # download a newer one based on the go.mod toolchain directive — that
  # would defeat the oldstable matrix entry.
  GOTOOLCHAIN: local

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
    - name: Lint Go Code
      uses: golangci/golangci-lint-action@v9

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['oldstable', 'stable']
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
    - name: Test
      run: go test -race ${{ matrix.go-version == 'stable' && '-covermode atomic -coverprofile=profile.cov' || ''}}
    - name: Upload coverage results
      if: matrix.go-version == 'stable'
      uses: shogo82148/actions-goveralls@v1
      with:
        path-to-profile: profile.cov
